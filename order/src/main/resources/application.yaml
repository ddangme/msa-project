server:
  port: 19010

spring:
  application:
    name: order-server

  datasource:
    url: jdbc:postgresql://localhost:5434/msa-project
    username: msa-project
    password: msa-project
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://eureka-server:8761/eureka/